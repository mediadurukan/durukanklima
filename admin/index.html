<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Durukan Klima – Admin Girişi</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f3a5c 0%, #1a6fa8 60%, #00b4d8 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-card {
      background: white;
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.2);
    }
    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-logo .icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #1a6fa8, #00b4d8);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin: 0 auto 14px;
    }
    .login-logo h1 {
      font-size: 1.4rem;
      font-weight: 800;
      color: #1e293b;
    }
    .login-logo p {
      font-size: 0.85rem;
      color: #64748b;
      margin-top: 4px;
    }
    .form-group { margin-bottom: 18px; }
    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 7px;
    }
    input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      font-size: 0.95rem;
      font-family: inherit;
      transition: border-color 0.2s;
      outline: none;
    }
    input:focus { border-color: #1a6fa8; }
    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #1a6fa8, #00b4d8);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.2s;
      font-family: inherit;
      margin-top: 8px;
    }
    .btn-login:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .error-msg {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.87rem;
      margin-bottom: 14px;
      display: none;
    }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-size: 0.85rem;
      color: #64748b;
    }
    .back-link a { color: #1a6fa8; font-weight: 600; text-decoration: none; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <div class="icon">❄️</div>
      <h1>Durukan Klima</h1>
      <p>Admin Paneli Girişi</p>
    </div>
    <div class="error-msg" id="error-msg">Kullanıcı adı veya şifre hatalı.</div>
    <form id="login-form">
      <div class="form-group">
        <label for="username">Kullanıcı Adı</label>
        <input type="text" id="username" placeholder="admin" autocomplete="username" required />
      </div>
      <div class="form-group">
        <label for="password">Şifre</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn-login" id="login-btn">Giriş Yap</button>
    </form>
    <div class="back-link"><a href="/">← Siteye Dön</a></div>
  </div>
  <script>
    // Zaten giriş yapılmışsa yönlendir
    if (localStorage.getItem('admin_token')) {
      window.location.href = '/admin/dashboard';
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const errEl = document.getElementById('error-msg');
      errEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Giriş yapılıyor...';

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (data.success) {
          localStorage.setItem('admin_token', data.token);
          window.location.href = '/admin/dashboard';
        } else {
          errEl.textContent = data.error || 'Giriş başarısız.';
          errEl.style.display = 'block';
        }
      } catch {
        errEl.textContent = 'Sunucuya bağlanılamadı.';
        errEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Giriş Yap';
      }
    });
  </script>
</body>
</html>
